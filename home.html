<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | Payoo</title>
    <link rel="shortcut icon" href="assets/logo.png" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        * {
            font-family: 'Outfit', sans-serif;
        }
    </style>
</head>

<body class="min-h-screen max-w-md mx-auto bg-base-200">
    <header class="border-b-2 border-gray-300 sticky top-0 bg-base-200 z-10">
        <section class="w-11/12 mx-auto py-3 flex justify-between items-center">
            <div class="left left flex gap-2 items-center">
                <div class="w-[60px]">
                    <img src="assets/logo.png" alt="">
                </div>
                <div class="balance-info">
                    <h2 class="text-xl font-bold">$ <span id="balance">45000</span></h2>
                    <p class="text-sm text-gray-400 font-semibold">Available Balance</p>
                </div>
            </div>
            <div class="right">
                <a href="/index.html" class="btn btn-soft"><i
                        class="fa-solid fa-arrow-right-from-bracket"></i>Logout</a>
            </div>
        </section>

    </header>
    <section class="w-11/12 mx-auto py-10 space-y-3">
        <h2 class="text-3xl font-bold">Welcome to Pay<span class="text-primary">oo</span></h2>
        <p class="text-neutral/50">Enjoy easy and convenient financial services with us. Cashout charge is low and
            transactions are fast.</p>
        <div class="buttons grid grid-cols-3 gap-3">
            <button class="btn btn-primary h-full py-4 rounded-xl btn-soft flex-col">
                <img src="assets/opt-1.png" alt="">
                <p>Add Money</p>
            </button>
            <button class="btn btn-primary h-full py-4 rounded-xl btn-soft flex-col">
                <img src="assets/opt-2.png" alt="">
                <p>Cashout</p>
            </button>
            <button class="btn btn-primary h-full py-4 rounded-xl btn-soft flex-col">
                <img src="assets/opt-3.png" alt="">
                <p>Send Money</p>
            </button>
            <button class="btn btn-primary h-full py-4 rounded-xl btn-soft flex-col">
                <img src="assets/opt-4.png" alt="">
                <p>Get Bonus</p>
            </button>
            <button class="btn btn-primary h-full py-4 rounded-xl btn-soft flex-col">
                <img src="assets/opt-5.png" alt="">
                <p>Pay Bill</p>
            </button>
            <button class="btn btn-primary h-full py-4 rounded-xl btn-soft flex-col">
                <img src="assets/opt-6.png" alt="">
                <p>Transactions</p>
            </button>

        </div>

    </section>

    <section id="add-money" class="w-11/12 mx-auto pb-20">
        <h2 class="text-xl font-bold">Add Money</h2>
        <div class="form pt-3">
            <div class="card bg-base-100 w-full shadow mx-auto rounded-2xl">
                <div class="card-body">
                    <fieldset class="fieldset">
                        <label class="label font-bold text-neutral">Select A Bank</label>
                        <select id="bank" class="select mb-3 w-full rounded-full bg-base-200">
                            <option value="" disabled selected>Select Bank</option>
                            <option>DBBL</option>
                            <option>FSIB</option>
                            <option>UCB</option>
                            <option>HSBC</option>
                        </select>
                        <label class="label font-bold text-neutral">Bank Account Number</label>
                        <input id="account-number" type="number" maxlength="11" minlength="11" required
                            class="input rounded-full bg-base-200 mb-3 w-full"
                            placeholder="Enter 11 Digit Account Number" />
                        <label class="label font-bold text-neutral">Amount To Add</label>
                        <input id="add-money-amount" type="number" class="input rounded-full bg-base-200 mb-3 w-full"
                            placeholder="Enter Amount To Add" />
                        <label class="label font-bold text-neutral">Pin Number</label>
                        <input id="add-money-pin" type="password" maxlength="4" minlength="4"
                            class="input rounded-full bg-base-200 w-full" placeholder="Enter Your 4 Digit Pin" />
                        <button id="add-money-btn" class="btn btn-primary mt-4 rounded-full">Add Money</button>
                    </fieldset>
                </div>
            </div>
        </div>
    </section>

    <section id="cashout" class="w-11/12 mx-auto pb-20 hidden">
        <h2 class="text-xl font-bold">Cashout</h2>
        <div class="form pt-3">
            <div class="card bg-base-100 w-full shadow mx-auto rounded-2xl">
                <div class="card-body">
                    <fieldset class="fieldset">
                        <label class="label font-bold text-neutral">Agent Number</label>
                        <input id="cashout-number" type="text" maxlength="11" minlength="11" required
                            class="input rounded-full bg-base-200 mb-3 w-full" placeholder="Enter 11 Digit Number" />
                        <label class="label font-bold text-neutral">Amount</label>
                        <input id="cashout-amount" type="number" class="input rounded-full bg-base-200 mb-3 w-full"
                            placeholder="Enter Amount To Withdraw" />
                        <label class="label font-bold text-neutral">Pin Number</label>
                        <input id="cashout-pin" type="password" maxlength="4" minlength="4"
                            class="input rounded-full bg-base-200 w-full" placeholder="Enter Your 4 Digit Pin" />
                        <button id="cashout-btn" class="btn btn-primary mt-4 rounded-full">Withdraw Money</button>
                    </fieldset>
                </div>
            </div>
        </div>
    </section>
    <script src="scripts/cashout.js"></script>
    <script src="scripts/functions.js"></script>
    <script src="scripts/addMoney.js"></script>
</body>

</html>
